name: watermarking_mobile
description: Watermark Detection App

version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Shared core package
  watermarking_core:
    path: ../watermarking_core

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_database: ^12.1.1
  firebase_storage: ^13.0.5

  # Auth
  google_sign_in: ^7.2.0

  # State management
  redux: ^5.0.0
  flutter_redux: ^0.10.0
  redux_epics: ^0.15.0
  redux_remote_devtools: ^3.0.0

  # Utilities
  rxdart: ^0.28.0
  path_provider: ^2.1.5
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.14

flutter:

  uses-material-design: true

  assets:
    - assets/facebook.png
    - assets/google.png
    - assets/dw_logo_white.svg
    - assets/lena.png
    - assets/lena-6-hello.png
