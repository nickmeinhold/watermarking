name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watermarking-docker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: watermarking-docker/package-lock.json
      - run: npm ci
      - run: npm test

  dart-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watermarking_core
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: latest
          cache: true
      - run: flutter pub get
      - run: flutter test
