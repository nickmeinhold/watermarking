name: watermarking_core
description: Shared models, services, and Redux logic for watermarking apps
version: 0.0.1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5

  # Auth
  google_sign_in: ^7.2.0

  # State management
  redux: ^5.0.0
  redux_epics: ^0.15.0

  # Utilities
  rxdart: ^0.28.0
  http: ^1.6.0

  # Charts
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
